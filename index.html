<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花畑の朝（完成版）</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <img class="bg-layer" id="bg-back" src="bg0.png" alt="背景うしろ">

        <img class="creature" id="foo1" src="foo.gif" alt="小さな生きもの1">
        <img class="creature" id="foo2" src="foo.gif" alt="小さな生きもの2">
        <img class="creature" id="foo3" src="foo.gif" alt="小さな生きもの3">
        <img class="creature" id="foo4" src="foo.gif" alt="小さな生きもの4">
        <img class="creature" id="foo5" src="foo.gif" alt="小さな生きもの5">

        <img class="bg-layer" id="bg-front" src="bg1.png" alt="背景てまえ">

        <img class="butterfly" id="butterfly1" src="butterfly.gif" alt="蝶1">
        <img class="butterfly" id="butterfly2" src="butterfly.gif" alt="蝶2">
        <img class="butterfly" id="butterfly3" src="butterfly.gif" alt="蝶3">

        <div class="text-group">
            ぽかぽか陽気の穏やかな朝<br>
            花畑では、蝶々がのんびり飛んでいます
        </div>
    </div>

    <script src="script.js"></script>

</html>
